        @layer utilities {
            .ppt-slide {

    <style>
        body {
            font-family: "Lato", sans-serif;
            background: #f7e1e5;
        }

        .cursive-font {
            font-family: "Great Vibes", cursive;
        }

        .title-font {
            font-family: "Playfair Display", serif
        }

        .body-font {
            font-family: "Cormorant Garamond", serif
        }

        .decorative-symbol {
            color: #B76E79;
            font-size: 160px;
            line-height: 1;
            letter-spacing: 8px
        }

        /* Initial states for animated elements - prevent flash */
        .animate-fade-in,
        .animate-slide-left,
        .animate-slide-right,
        .animate-scale {
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        .animate-slide-left {
            animation: slideInLeft 1.5s ease-out forwards;
        }

        .animate-slide-right {
            animation: slideInRight 1.5s ease-out forwards;
        }

        .animate-scale {
            animation: scaleIn 1.3s ease-out forwards;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        .delay-400 {
            animation-delay: 0.4s;
        }

        .delay-600 {
            animation-delay: 0.6s;
        }

        .delay-800 {
            animation-delay: 0.8s;
        }

        @keyframes spinSlow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spinSlow 10s linear infinite;
        }

        .animate-spin-slow.paused {
            animation-play-state: paused;
        }

        @keyframes pulse-ring {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.85;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        .music-btn:hover .ring-icon {
            animation: pulse-ring 1s ease-in-out infinite;
        }

        /* Falling Petals Animation */
        .petal {
            position: absolute;
            background: #ffffff;
            border-radius: 150% 0 150% 0;
            opacity: 0.85;
            pointer-events: none;
            z-index: 15;
            /* Behind text (z-20) but above watermark */
            box-shadow: 0 2px 6px rgba(183, 110, 121, 0.12);
            /* subtle blush-tinted shadow */
            border: 0.5px solid rgba(183, 110, 121, 0.2);
            /* light rose-gold border */
        }

        @keyframes fall {
            0% {
                opacity: 0;
                transform: translateY(-10px) rotate(0deg) translateX(0px);
            }

            10% {
                opacity: 0.8;
            }

            80% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(360deg) translateX(50px);
            }
        }

        /* Responsive adjustments for very small screens */
        @media (max-width: 375px) {
            .cursive-font {
                font-size: 2.5rem !important;
            }
        }
    </style>

    <script>
        // Music Control
        const musicToggle = document.getElementById('musicToggle');
        const bgMusic = document.getElementById('bgMusic');
        const ringIcon = document.getElementById('ringIcon');
        let isPlaying = false;
        let manualPause = false; // Tracks if user explicitly turned off music
        let isAttemptingPlay = false;

        // Ensure music loops (replays when finished)
        bgMusic.loop = true;

        // Function to play music
        function playMusic() {
            if (isPlaying || isAttemptingPlay) return;

            isAttemptingPlay = true;
            bgMusic.play().then(() => {
                isPlaying = true;
                isAttemptingPlay = false;
                ringIcon.classList.remove('paused');
            }).catch(err => {
                console.log('Autoplay prevented/pending interaction');
                isPlaying = false;
                isAttemptingPlay = false;
                ringIcon.classList.add('paused');
            });
        }

        // Function to pause music
        function pauseMusic() {
            bgMusic.pause();
            isPlaying = false;
            ringIcon.classList.add('paused');
        }

        // Try autoplay on load
        window.addEventListener('load', function () {
            playMusic();
        });

        // Interaction handler (Hover/Move/Scroll/Click)
        function handleInteraction() {
            // Only try to play if not playing AND user hasn't manually paused
            if (!isPlaying && !manualPause) {
                playMusic();
            }
        }

        // Listen for user interactions/hover
        // 'mousemove' covers "hovering" over the HTML
        ['click', 'touchstart', 'mousemove', 'scroll', 'keydown'].forEach(event => {
            document.addEventListener(event, handleInteraction, { passive: true });
        });

        // Click on ring to toggle pause/play
        musicToggle.addEventListener('click', function (e) {
            e.stopPropagation();
            if (isPlaying) {
                manualPause = true; // User explicitly paused - disable auto-hover
                pauseMusic();
            } else {
                manualPause = false; // User explicitly played - re-enable auto-hover for future errors/pauses if any
                playMusic();
            }
        });

        // Falling Petals Logic
        function createPetal() {
            const container = document.getElementById('petals-container');
            const petal = document.createElement('div');
            petal.classList.add('petal');

            // Randomize properties
            const left = Math.random() * 100; // 0-100% width
            const animDuration = 6 + Math.random() * 6; // 6-12s fall time
            const size = 10 + Math.random() * 15; // 10-25px size
            const delay = Math.random() * 5; // 0-5s delay

            petal.style.left = `${left}%`;
            petal.style.width = `${size}px`;
            petal.style.height = `${size}px`;
            petal.style.top = `-20px`;
            petal.style.animation = `fall ${animDuration}s linear ${delay}s infinite`;

            // Randomize color slightly
            const colors = ['#FFFFFF', '#FFF0F2', '#FFD5E2', '#F8BBD0', '#FCE4EC'];
            petal.style.background = colors[Math.floor(Math.random() * colors.length)];

            container.appendChild(petal);
        }

        // Create initial batch of petals
        window.addEventListener('load', () => {
            for (let i = 0; i < 20; i++) {
                createPetal();
            }
        });

        // Interactive Mousemove Sparkles/Hearts effect (Cursor Trail)
        let lastX = 0;
        let lastY = 0;
        const spawnDistance = 45; // Spawn a heart every 45px of mouse movement

        document.addEventListener('mousemove', function (e) {
            const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            if (dist < spawnDistance) return;

            lastX = e.clientX;
            lastY = e.clientY;

            const heart = document.createElement('div');
            const symbols = ['❤️', '💖', '✨', '💕', '🌸'];
            heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];

            // Position absolute relative to page document body (handling scroll)
            const posX = e.clientX + window.scrollX;
            const posY = e.clientY + window.scrollY;

            heart.style.position = 'absolute';
            heart.style.left = `${posX}px`;
            heart.style.top = `${posY}px`;
            heart.style.transform = 'translate(-50%, -50%) scale(0.4)';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '999';
            heart.style.fontSize = `${12 + Math.random() * 12}px`;
            // Smooth float up and fade out transition
            heart.style.transition = 'all 1.2s cubic-bezier(0.1, 0.8, 0.3, 1)';
            heart.style.opacity = '1';

            document.body.appendChild(heart);

            // Force reflow and apply animations
            requestAnimationFrame(() => {
                heart.style.top = `${posY - 80 - Math.random() * 40}px`;
                heart.style.left = `${posX + (Math.random() - 0.5) * 40}px`;
                heart.style.transform = 'translate(-50%, -50%) scale(1.4) rotate(' + ((Math.random() - 0.5) * 90) + 'deg)';
                heart.style.opacity = '0';
            });

            setTimeout(() => {
                heart.remove();
            }, 1200);
        });

        // TV Scale: fit 1920×1080 design to any screen (720p, 1080p, 2K, 4K)
        // Uses screen.width for actual physical resolution (not affected by browser zoom)
        (function initTVScale() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const sw = screen.width || vw;
            const sh = screen.height || vh;

            // Activate for landscape screens >= 600px wide (covers all TVs)
            const isLargeScreen = (sw >= 600 || vw >= 600) && vw >= vh;
            if (!isLargeScreen) return;

            const DESIGN_W = 1920, DESIGN_H = 1080;
            const slide = document.querySelector('.ppt-slide');

            document.body.style.overflow = 'hidden';
            document.body.style.margin = '0';
            document.documentElement.style.overflow = 'hidden';

            slide.style.position = 'fixed';
            slide.style.width = DESIGN_W + 'px';
            slide.style.height = DESIGN_H + 'px';
            slide.style.transformOrigin = 'top left';

            function applyScale() {
                const cw = window.innerWidth;
                const ch = window.innerHeight;
                const scale = Math.min(cw / DESIGN_W, ch / DESIGN_H);
                const offsetX = Math.max(0, (cw - DESIGN_W * scale) / 2);
                const offsetY = Math.max(0, (ch - DESIGN_H * scale) / 2);
                slide.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
            }

            applyScale();
            window.addEventListener('resize', applyScale);
        })();
    </script>
